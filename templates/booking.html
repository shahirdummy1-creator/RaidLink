<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Book a Ride – RaidLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }

        /* Map container */
        #map { width: 100%; height: 420px; border-radius: 16px; overflow: hidden; box-shadow: 0 4px 20px rgba(0,0,0,.12); }

        /* Autocomplete dropdown */
        .autocomplete-wrap { position: relative; }
        .autocomplete-list {
            position: absolute; top: 100%; left: 0; right: 0; z-index: 1000;
            background: #fff; border: 1px solid #e5e7eb;
            border-radius: 0 0 10px 10px;
            box-shadow: 0 8px 24px rgba(0,0,0,.1);
            max-height: 220px; overflow-y: auto;
            display: none;
        }
        .autocomplete-list.show { display: block; }
        .autocomplete-item {
            padding: 10px 14px; cursor: pointer;
            font-size: .88rem; border-bottom: 1px solid #f3f4f6;
            display: flex; align-items: flex-start; gap: 10px;
        }
        .autocomplete-item:last-child { border-bottom: none; }
        .autocomplete-item:hover { background: #eff6ff; }
        .autocomplete-item .place-name { font-weight: 600; color: #111827; }
        .autocomplete-item .place-addr { font-size: .78rem; color: #6b7280; margin-top: 2px; }
        .autocomplete-item .place-icon { color: #0d6efd; margin-top: 2px; flex-shrink: 0; }

        /* Location confirmed badge */
        .loc-badge {
            display: inline-flex; align-items: center; gap: 6px;
            background: #f0fdf4; border: 1px solid #bbf7d0;
            color: #166534; font-size: .78rem; font-weight: 600;
            padding: 4px 10px; border-radius: 20px; margin-top: 4px;
        }

        /* Route line on map */
        .map-legend {
            display: flex; gap: 16px; margin-top: 10px;
            font-size: .8rem; color: #6b7280;
        }
        .legend-dot { width: 10px; height: 10px; border-radius: 50%; display: inline-block; margin-right: 4px; }

        /* Card */
        .booking-card {
            background: #fff; border-radius: 20px;
            box-shadow: 0 4px 24px rgba(0,0,0,.08);
            padding: 32px;
        }
        .section-label {
            font-size: .72rem; font-weight: 700; text-transform: uppercase;
            letter-spacing: .08em; color: #6b7280; margin-bottom: 8px;
        }
        .distance-badge {
            background: #eff6ff; border: 1px solid #bfdbfe;
            border-radius: 10px; padding: 10px 16px;
            display: flex; align-items: center; justify-content: space-between;
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container">
        <a class="navbar-brand fw-bold" href="{{ url_for('welcome') }}">
            <i class="bi bi-taxi-front me-2"></i>RaidLink
        </a>
        <a href="{{ url_for('rider_bookings', username=username) }}" class="btn btn-sm btn-outline-light">
            <i class="bi bi-list-ul me-1"></i> My Bookings
        </a>
    </div>
</nav>

<div class="container py-4">
    <div class="row g-4 align-items-start">

        <!-- LEFT: Map -->
        <div class="col-lg-6">
            <div id="map"></div>
            <div class="map-legend mt-2">
                <span><span class="legend-dot" style="background:#22c55e;"></span>Pickup</span>
                <span><span class="legend-dot" style="background:#ef4444;"></span>Drop</span>
                <span id="map-distance-label" class="ms-auto fw-semibold text-primary"></span>
            </div>
        </div>

        <!-- RIGHT: Booking Form -->
        <div class="col-lg-6">
            <div class="booking-card">
                <h4 class="fw-bold mb-4">Book Your Ride</h4>

                <form action="/submit" method="POST" id="bookingForm">
                    <input type="hidden" name="username" value="{{ username }}">
                    <input type="hidden" id="pickup_pincode" name="pickup_pincode">
                    <input type="hidden" id="drop_pincode"   name="drop_pincode">

                    <!-- Pickup -->
                    <div class="mb-3">
                        <div class="section-label"><i class="bi bi-geo-alt-fill text-success me-1"></i>Pickup Location</div>
                        <div class="autocomplete-wrap">
                            <input type="text" class="form-control" id="pickup" name="pickup"
                                   placeholder="Search pickup location..." required autocomplete="off">
                            <div class="autocomplete-list" id="pickup-list"></div>
                        </div>
                        <div id="pickup-badge"></div>
                    </div>

                    <!-- Drop -->
                    <div class="mb-3">
                        <div class="section-label"><i class="bi bi-flag-fill text-danger me-1"></i>Drop Location</div>
                        <div class="autocomplete-wrap">
                            <input type="text" class="form-control" id="drop" name="drop"
                                   placeholder="Search drop location..." required autocomplete="off">
                            <div class="autocomplete-list" id="drop-list"></div>
                        </div>
                        <div id="drop-badge"></div>
                    </div>

                    <!-- Distance & Fare -->
                    <div class="mb-3">
                        <div class="distance-badge">
                            <div>
                                <div class="section-label mb-0">Distance</div>
                                <input type="number" id="distance" name="distance" step="0.1"
                                       class="form-control form-control-sm border-0 p-0 fw-bold fs-5 bg-transparent"
                                       placeholder="—" style="width:100px;" required>
                                <small class="text-muted">km (auto-calculated or enter manually)</small>
                            </div>
                            <div class="text-end">
                                <div class="section-label mb-0">Estimated Fare</div>
                                <div id="fare-display" class="fw-bold fs-5 text-success">—</div>
                                <input type="hidden" id="fare" name="fare">
                            </div>
                        </div>
                    </div>

                    <!-- Date & Time -->
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <div class="section-label">Ride Date</div>
                            <input type="date" class="form-control" id="ride_date" name="ride_date" required>
                        </div>
                        <div class="col-6">
                            <div class="section-label">Ride Time</div>
                            <input type="time" class="form-control" id="ride_time" name="ride_time" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-primary w-100 fw-bold py-2 mb-2">
                        <i class="bi bi-check-circle me-1"></i> Confirm Booking
                    </button>
                    <a href="{{ url_for('outstation', username=username) }}" class="btn btn-outline-warning w-100 fw-bold py-2">
                        <i class="bi bi-signpost-2 me-1"></i> Outstation Booking
                    </a>
                </form>
            </div>
        </div>
    </div>
</div>

<!-- MapMyIndia (Mappls) Map SDK -->
<script src="https://apis.mappls.com/advancedmaps/v1/{{ mappls_key }}/map_load?v=1.5&plugins=direction"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
const MAPPLS_KEY = '{{ mappls_key }}';
const coords     = { pickup: null, drop: null };
let   map, pickupMarker, dropMarker, routeLayer;

// ── Init map ──────────────────────────────────────────────
window.addEventListener('load', function () {
    map = new mappls.Map('map', {
        center: [20.5937, 78.9629],
        zoom: 5,
        search: false
    });
});

// ── Haversine distance ────────────────────────────────────
function haversine(lat1, lon1, lat2, lon2) {
    const R = 6371, r = x => x * Math.PI / 180;
    const dLat = r(lat2-lat1), dLon = r(lon2-lon1);
    const a = Math.sin(dLat/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(dLon/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function updateDistanceFare() {
    if (!coords.pickup || !coords.drop) return;
    const dist = (haversine(...coords.pickup, ...coords.drop) + 5).toFixed(1);
    document.getElementById('distance').value = dist;
    const fare = (25 * dist).toFixed(2);
    document.getElementById('fare').value = '₹' + fare;
    document.getElementById('fare-display').textContent = '₹' + fare;
    document.getElementById('map-distance-label').textContent = dist + ' km';

    // Draw markers and fit map
    if (pickupMarker) pickupMarker.remove();
    if (dropMarker)   dropMarker.remove();
    pickupMarker = new mappls.Marker({ map, position: { lat: coords.pickup[0], lng: coords.pickup[1] }, icon: { url: 'https://apis.mappls.com/map_v3/1.png' } });
    dropMarker   = new mappls.Marker({ map, position: { lat: coords.drop[0],   lng: coords.drop[1]   } });
    map.fitBounds([[coords.pickup[0], coords.pickup[1]], [coords.drop[0], coords.drop[1]]], { padding: 60 });
}

// ── Mappls Autosuggest ────────────────────────────────────
async function autosuggest(query, type) {
    if (query.length < 3) { closeList(type); return; }
    try {
        const res  = await fetch(
            `https://atlas.mappls.com/api/places/search/json?query=${encodeURIComponent(query)}&region=IND&access_token=${MAPPLS_KEY}`
        );
        const data = await res.json();
        const suggestions = data.suggestedLocations || [];
        renderList(suggestions, type);
    } catch {
        // Fallback to Nominatim if Mappls fails
        nominatimFallback(query, type);
    }
}

async function nominatimFallback(query, type) {
    try {
        const res  = await fetch(
            `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+', India')}&format=json&limit=5&addressdetails=1`,
            { headers: { 'Accept-Language': 'en' } }
        );
        const data = await res.json();
        const suggestions = data.map(p => ({
            placeName:   p.display_name.split(',')[0],
            placeAddress:p.display_name.split(',').slice(1,3).join(','),
            latitude:    parseFloat(p.lat),
            longitude:   parseFloat(p.lon),
            pincode:     p.address?.postcode || ''
        }));
        renderList(suggestions, type);
    } catch { closeList(type); }
}

function renderList(suggestions, type) {
    const list = document.getElementById(type + '-list');
    if (!suggestions.length) { closeList(type); return; }
    list.innerHTML = suggestions.slice(0, 6).map((s, i) => `
        <div class="autocomplete-item" onclick="selectPlace(${i}, '${type}')">
            <i class="bi bi-geo-alt place-icon"></i>
            <div>
                <div class="place-name">${s.placeName || s.placeName}</div>
                <div class="place-addr">${s.placeAddress || ''}</div>
            </div>
        </div>
    `).join('');
    list._data = suggestions;
    list.classList.add('show');
}

function selectPlace(idx, type) {
    const list  = document.getElementById(type + '-list');
    const place = list._data[idx];
    const name  = place.placeName || '';
    const lat   = parseFloat(place.latitude  || place.lat);
    const lng   = parseFloat(place.longitude || place.lon);
    const pin   = place.pincode || place.eLoc || '';

    document.getElementById(type).value = name;
    document.getElementById(type + '_pincode').value = pin;
    coords[type] = [lat, lng];

    // Show badge
    document.getElementById(type + '-badge').innerHTML =
        `<span class="loc-badge"><i class="bi bi-check-circle-fill"></i>${(place.placeAddress || '').split(',').slice(0,2).join(',') || name}</span>`;

    closeList(type);
    updateDistanceFare();

    // Pan map to selected location
    if (map) map.setCenter({ lat, lng });
}

function closeList(type) {
    const list = document.getElementById(type + '-list');
    list.classList.remove('show');
    list.innerHTML = '';
}

// ── Event listeners ───────────────────────────────────────
const timers = {};
['pickup', 'drop'].forEach(type => {
    const inp = document.getElementById(type);
    inp.addEventListener('input', function () {
        clearTimeout(timers[type]);
        const val = this.value.trim();
        if (val.length < 3) {
            closeList(type);
            coords[type] = null;
            document.getElementById(type + '-badge').innerHTML = '';
            document.getElementById('distance').value = '';
            document.getElementById('fare').value = '';
            document.getElementById('fare-display').textContent = '—';
            document.getElementById('map-distance-label').textContent = '';
            return;
        }
        timers[type] = setTimeout(() => autosuggest(val, type), 400);
    });
    inp.addEventListener('blur', () => setTimeout(() => closeList(type), 200));
});

// Manual distance → update fare
document.getElementById('distance').addEventListener('input', function () {
    const d = parseFloat(this.value);
    if (!isNaN(d) && d > 0) {
        const fare = '₹' + (25 * d).toFixed(2);
        document.getElementById('fare').value = fare;
        document.getElementById('fare-display').textContent = fare;
    } else {
        document.getElementById('fare').value = '';
        document.getElementById('fare-display').textContent = '—';
    }
});

// Set default date/time
document.addEventListener('DOMContentLoaded', function () {
    const now = new Date();
    document.getElementById('ride_date').value = now.toISOString().split('T')[0];
    document.getElementById('ride_time').value = now.toTimeString().substring(0, 5);
});

// Close dropdown on outside click
document.addEventListener('click', e => {
    ['pickup', 'drop'].forEach(type => {
        if (!document.getElementById(type).contains(e.target))
            closeList(type);
    });
});
</script>
</body>
</html>
