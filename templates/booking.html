<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Service</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="#">
            RaidLink Technologies
        </a>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero-section py-5" style="background-color: white;">
    <div class="container">
        <div class="row align-items-center">

            <!-- LEFT SIDE (Text + Car) -->
            <div class="col-lg-6 text-center mb-4 mb-lg-0">
                <h1 class="fw-bold mb-3">Book Your Ride Instantly</h1>
                <p class="text-muted mb-4">Fast, safe and reliable taxi service at your fingertips.</p>
                <div class="car-container" style="background-color: white; padding: 20px; border-radius: 15px; display: inline-block;">
                    <img src="{{ url_for('static', filename='images/car.png') }}"
                         class="img-fluid"
                         alt="Taxi Car"
                         style="max-width: 70%; border-radius: 10px;">
                </div>
                <div class="mt-4" style="display:none;">
                    <a href="{{ url_for('rider_bookings', username=username) }}" class="btn btn-outline-primary">
                        <i class="bi bi-list-ul me-1"></i> View My Bookings
                    </a>
                </div>
            </div>

            <!-- RIGHT SIDE (Booking Card) -->
            <div class="col-lg-6 d-flex justify-content-center">
                <div class="card shadow-lg p-4 rounded-4" style="width: 85%; min-height: 37.5vh;">
                    <h3 class="card-title text-center mb-4 fw-bold">Book Your Taxi</h3>
                    <form action="/submit" method="POST">
                        <input type="hidden" name="username" value="{{ username }}">

                        <!-- Pickup -->
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Pickup Location</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="pickup" name="pickup"
                                       placeholder="Enter pickup location" required autocomplete="off">
                                <a href="https://www.google.com/maps" target="_blank"
                                   class="btn btn-outline-secondary" title="Open Google Maps">
                                    <i class="bi bi-geo-alt-fill text-danger"></i>
                                </a>
                            </div>
                            <small id="pickup_info" class="text-muted"></small>
                        </div>
                        <div class="mb-3" style="display:none;">
                            <label class="form-label fw-semibold">Pickup Pincode</label>
                            <input type="text" class="form-control bg-light" id="pickup_pincode"
                                   name="pickup_pincode" placeholder="Auto-fetched" readonly>
                        </div>

                        <!-- Drop -->
                        <div class="mb-2">
                            <label class="form-label fw-semibold">Drop Location</label>
                            <div class="input-group">
                                <input type="text" class="form-control" id="drop" name="drop"
                                       placeholder="Enter drop location" required autocomplete="off">
                                <a href="https://www.google.com/maps" target="_blank"
                                   class="btn btn-outline-secondary" title="Open Google Maps">
                                    <i class="bi bi-geo-alt-fill text-danger"></i>
                                </a>
                            </div>
                            <small id="drop_info" class="text-muted"></small>
                        </div>
                        <div class="mb-3" style="display:none;">
                            <label class="form-label fw-semibold">Drop Pincode</label>
                            <input type="text" class="form-control bg-light" id="drop_pincode"
                                   name="drop_pincode" placeholder="Auto-fetched" readonly>
                        </div>

                        <div class="mb-3">
                            <label for="distance" class="form-label fw-semibold">Total Ride Distance (km)</label>
                            <input type="number" class="form-control" id="distance" name="distance"
                                   placeholder="Auto-calculated or enter manually" step="0.1" required>
                        </div>
                        <div class="mb-3">
                            <label for="fare" class="form-label fw-semibold">Ride Fare</label>
                            <input type="text" class="form-control" id="fare" name="fare" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="ride_date" class="form-label fw-semibold">Ride Schedule Date</label>
                            <input type="date" class="form-control" id="ride_date" name="ride_date" required>
                        </div>
                        <div class="mb-3">
                            <label for="ride_time" class="form-label fw-semibold">Ride Schedule Time</label>
                            <input type="time" class="form-control" id="ride_time" name="ride_time" required>
                        </div>
                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary flex-grow-1 fw-bold py-2">Book Ride</button>
                            <a href="{{ url_for('outstation', username=username) }}" class="btn btn-warning flex-grow-1 fw-bold py-2">
                                <i class="bi bi-signpost-2 me-1"></i> Outstation
                            </a>
                        </div>
                        <div class="mt-2">
                            <a href="{{ url_for('rider_bookings', username=username) }}" class="btn btn-outline-primary w-100 fw-bold py-2">
                                <i class="bi bi-list-ul me-1"></i> View My Bookings
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
document.addEventListener('DOMContentLoaded', function () {
    const now = new Date();
    document.getElementById('ride_date').value = now.toISOString().split('T')[0];
    document.getElementById('ride_time').value = now.toTimeString().substring(0, 5);

    const coords = { pickup: null, drop: null };

    function haversine(lat1, lon1, lat2, lon2) {
        const R = 6371, toRad = x => x * Math.PI / 180;
        const dLat = toRad(lat2 - lat1), dLon = toRad(lon2 - lon1);
        const a = Math.sin(dLat/2)**2 + Math.cos(toRad(lat1)) * Math.cos(toRad(lat2)) * Math.sin(dLon/2)**2;
        return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
    }

    function updateDistanceAndFare() {
        if (coords.pickup && coords.drop) {
            const dist = haversine(coords.pickup[0], coords.pickup[1], coords.drop[0], coords.drop[1]);
            const adjustedDist = (dist + 5).toFixed(1);
            document.getElementById('distance').value = adjustedDist;
            document.getElementById('fare').value = '₹' + (25 * adjustedDist).toFixed(2);
        }
    }

    window.fetchLocation = async function(type) {
        const locationVal = document.getElementById(type).value.trim();
        if (!locationVal) return;
        const infoEl    = document.getElementById(type + '_info');
        const pincodeEl = document.getElementById(type + '_pincode');
        infoEl.textContent    = '⏳ Fetching...';
        pincodeEl.value       = '';
        coords[type]          = null;
        try {
            const res  = await fetch(
                `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(locationVal + ', India')}&format=json&limit=1&addressdetails=1`,
                { headers: { 'Accept-Language': 'en' } }
            );
            const data = await res.json();
            if (data.length > 0) {
                const place   = data[0];
                const pincode = place.address?.postcode || '';
                coords[type]  = [parseFloat(place.lat), parseFloat(place.lon)];
                pincodeEl.value    = pincode;
                infoEl.textContent = '✅ ' + place.display_name.split(',').slice(0, 3).join(', ');
                infoEl.className   = 'text-success small';
                updateDistanceAndFare();
            } else {
                infoEl.textContent = '❌ Location not found. Try a more specific name.';
                infoEl.className   = 'text-danger small';
            }
        } catch {
            infoEl.textContent = '❌ Lookup failed. Check your connection.';
            infoEl.className   = 'text-danger small';
        }
    };

    // Recalculate fare when distance is manually edited
    document.getElementById('distance').addEventListener('input', function () {
        const d = parseFloat(this.value);
        document.getElementById('fare').value = (!isNaN(d) && d > 0) ? '₹' + (25 * d).toFixed(2) : '';
    });

    // Auto-fetch on input with debounce
    const debounceTimers = {};
    ['pickup', 'drop'].forEach(type => {
        document.getElementById(type).addEventListener('input', function () {
            clearTimeout(debounceTimers[type]);
            const val = this.value.trim();
            if (val.length < 3) {
                document.getElementById(type + '_info').textContent = '';
                document.getElementById(type + '_pincode').value = '';
                coords[type] = null;
                document.getElementById('distance').value = '';
                document.getElementById('fare').value = '';
                return;
            }
            document.getElementById(type + '_info').textContent = '⏳ Fetching...';
            debounceTimers[type] = setTimeout(() => fetchLocation(type), 800);
        });
    });
});
</script>

</body>
</html>
