<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Taxi Service</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

    <!-- Custom CSS -->
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

<!-- Navbar -->
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="#">
            RaidLink Technologies
        </a>
    </div>
</nav>

<!-- Hero Section -->
<section class="hero-section py-5" style="background-color: white;">
    <div class="container">
        <div class="row align-items-center">

            <!-- LEFT SIDE (Text + Car) -->
            <div class="col-lg-6 text-center mb-4 mb-lg-0">
                <h1 class="fw-bold mb-3">Book Your Ride Instantly</h1>
                <p class="text-muted mb-4">Fast, safe and reliable taxi service at your fingertips.</p>
                <div class="car-container" style="background-color: white; padding: 20px; border-radius: 15px; display: inline-block;">
                    <img src="{{ url_for('static', filename='images/car.png') }}" 
                         class="img-fluid" 
                         alt="Taxi Car"
                         style="max-width: 100%; border-radius: 10px;">
                </div>
            </div>

            <!-- RIGHT SIDE (Booking Card) -->
            <div class="col-lg-6 d-flex justify-content-center">
                <div class="card shadow-lg p-4 rounded-4" style="width: 70%; min-height: 37.5vh;">
                    <h3 class="card-title text-center mb-4 fw-bold">Book Your Taxi</h3>
                    <form action="/submit" method="POST">
                        <div class="mb-3">
                            <label for="name" class="form-label fw-semibold">Name</label>
                            <input type="text" class="form-control" id="name" name="name" placeholder="Enter your name" required>
                        </div>
                        <div class="mb-3">
                            <label for="phone" class="form-label fw-semibold">Phone</label>
                            <input type="text" class="form-control" id="phone" name="phone" placeholder="Enter phone number" required>
                        </div>
                        <div class="mb-3">
                            <label for="pickup" class="form-label fw-semibold">Pickup Location</label>
                            <input type="text" class="form-control" id="pickup" name="pickup" placeholder="Enter pickup location" required>
                        </div>
                        <div class="mb-3">
                            <label for="drop" class="form-label fw-semibold">Drop Location</label>
                            <input type="text" class="form-control" id="drop" name="drop" placeholder="Enter destination" required>
                        </div>
                        <div class="mb-3">
                            <label for="distance" class="form-label fw-semibold">Total Ride Distance (km)</label>
                            <input type="number" class="form-control" id="distance" name="distance" placeholder="Enter distance in km" step="0.1" required>
                        </div>
                        <div class="mb-3">
                            <label for="fare" class="form-label fw-semibold">Ride Fare</label>
                            <input type="text" class="form-control" id="fare" name="fare" readonly>
                        </div>
                        <div class="mb-3">
                            <label for="ride_date" class="form-label fw-semibold">Ride Schedule Date</label>
                            <input type="date" class="form-control" id="ride_date" name="ride_date" required>
                        </div>
                        <div class="mb-3">
                            <label for="ride_time" class="form-label fw-semibold">Ride Schedule Time</label>
                            <input type="time" class="form-control" id="ride_time" name="ride_time" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                            Book Ride
                        </button>
                    </form>
                </div>
            </div>

        </div>
    </div>
</section>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

<script>
    // Set current date and time as default
    document.addEventListener('DOMContentLoaded', function() {
        const now = new Date();
        const dateStr = now.toISOString().split('T')[0];
        const timeStr = now.toTimeString().split(' ')[0].substring(0, 5);
        document.getElementById('ride_date').value = dateStr;
        document.getElementById('ride_time').value = timeStr;

        // Auto calculate fare
        document.getElementById('distance').addEventListener('input', function() {
            const distance = parseFloat(this.value);
            if (!isNaN(distance) && distance > 0) {
                const fare = 25 * distance;
                document.getElementById('fare').value = '₹' + fare.toFixed(2);
            } else {
                document.getElementById('fare').value = '';
            }
        });
    });
</script>

</body>
</html>
