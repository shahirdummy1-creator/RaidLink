<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Login</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="{{ url_for('welcome') }}">RaidLink Technologies</a>
    </div>
</nav>

<section class="hero-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-6">
                <div class="card shadow-lg p-4 rounded-4 login-card mx-auto">
                    <h3 class="text-center mb-4 fw-bold">Driver Login</h3>
                    {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                    {% endif %}
                    <form method="POST" action="{{ url_for('driver_login') }}">
                        <div class="mb-3">
                            <label for="user_id" class="form-label">Driver ID</label>
                            <input type="text" class="form-control" id="user_id" name="user_id" placeholder="Enter Driver ID" required>
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">Password</label>
                            <input type="password" class="form-control" id="password" name="password" placeholder="Enter password" required>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Login</button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="mb-1 text-muted">Use Driver ID <strong>driver123</strong> and password <strong>driverpass</strong></p>
                        <a href="{{ url_for('driver_signup') }}" class="btn btn-outline-primary">Create Driver Account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
