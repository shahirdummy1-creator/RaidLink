<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Joining Fee Payment – RaidLink</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        .fee-card {
            max-width: 480px;
            margin: 0 auto;
            border-radius: 16px;
            box-shadow: 0 4px 24px rgba(0,0,0,0.10);
        }
        .fee-amount {
            font-size: 3rem;
            font-weight: 800;
            color: #0d6efd;
        }
        .secure-badge {
            font-size: .78rem;
            color: #6b7280;
        }
        .btn-pay {
            background: #0d6efd;
            color: #fff;
            border: none;
            border-radius: 10px;
            padding: 14px;
            font-size: 1.05rem;
            font-weight: 700;
            width: 100%;
            transition: background .2s;
        }
        .btn-pay:hover { background: #0b5ed7; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="{{ url_for('welcome') }}">RaidLink Technologies</a>
    </div>
</nav>

<section class="hero-section py-5">
    <div class="container">
        <div class="fee-card card p-4">

            <div class="text-center mb-4">
                <div class="mb-2">
                    <i class="bi bi-shield-lock-fill text-primary" style="font-size:2.5rem;"></i>
                </div>
                <h4 class="fw-bold mb-1">Driver Joining Fee</h4>
                <p class="text-muted mb-0" style="font-size:.9rem;">One-time registration fee to activate your driver account</p>
            </div>

            <div class="text-center mb-4">
                <div class="fee-amount">₹50</div>
                <small class="text-muted">One-time · Non-refundable</small>
            </div>

            <div class="bg-light rounded-3 p-3 mb-4">
                <div class="d-flex justify-content-between mb-1">
                    <span class="text-muted" style="font-size:.85rem;">Driver</span>
                    <span class="fw-600" style="font-size:.85rem;">{{ driver_name }}</span>
                </div>
                <div class="d-flex justify-content-between mb-1">
                    <span class="text-muted" style="font-size:.85rem;">Email</span>
                    <span style="font-size:.85rem;">{{ driver_email }}</span>
                </div>
                <div class="d-flex justify-content-between">
                    <span class="text-muted" style="font-size:.85rem;">Mobile</span>
                    <span style="font-size:.85rem;">{{ driver_mobile }}</span>
                </div>
            </div>

            <button class="btn-pay mb-3" onclick="openRazorpay()">
                <i class="bi bi-credit-card me-2"></i> Pay ₹50 via UPI / Card
            </button>

            <div class="text-center secure-badge">
                <i class="bi bi-lock-fill me-1"></i> Secured by Razorpay &nbsp;|&nbsp; UPI · Cards · Net Banking
            </div>
        </div>
    </div>
</section>

<!-- Hidden form to submit payment result -->
<form id="paymentForm" method="POST" action="{{ url_for('driver_payment_success') }}">
    <input type="hidden" name="razorpay_payment_id" id="razorpay_payment_id">
    <input type="hidden" name="razorpay_order_id"   id="razorpay_order_id">
    <input type="hidden" name="razorpay_signature"  id="razorpay_signature">
</form>

<script src="https://checkout.razorpay.com/v1/checkout.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function openRazorpay() {
    const options = {
        key:         '{{ razorpay_key }}',
        amount:      {{ amount }},
        currency:    'INR',
        name:        'RaidLink Technologies',
        description: 'Driver Joining Fee',
        order_id:    '{{ order_id }}',
        prefill: {
            name:    '{{ driver_name }}',
            email:   '{{ driver_email }}',
            contact: '{{ driver_mobile }}'
        },
        theme: { color: '#0d6efd' },
        method: { upi: true, card: true, netbanking: true, wallet: true },
        handler: function(response) {
            document.getElementById('razorpay_payment_id').value = response.razorpay_payment_id;
            document.getElementById('razorpay_order_id').value   = response.razorpay_order_id   || '';
            document.getElementById('razorpay_signature').value  = response.razorpay_signature  || '';
            document.getElementById('paymentForm').submit();
        },
        modal: {
            ondismiss: function() {
                alert('Payment cancelled. Please complete the payment to register.');
            }
        }
    };
    const rzp = new Razorpay(options);
    rzp.open();
}
</script>
</body>
</html>
