<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Signup</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="{{ url_for('welcome') }}">RaidLink Technologies</a>
    </div>
</nav>

<section class="hero-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg p-4 rounded-4 login-card mx-auto">
                    <h3 class="text-center mb-4 fw-bold">Driver Signup</h3>
                    <form method="POST" action="{{ url_for('driver_signup') }}" enctype="multipart/form-data">
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="username" class="form-label">Username</label>
                                <input type="text" class="form-control" id="username" name="username" placeholder="Enter username" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="mobile" class="form-label">Mobile Number</label>
                                <input type="tel" class="form-control" id="mobile" name="mobile" placeholder="Enter mobile number" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="email" class="form-label">Email ID</label>
                                <input type="email" class="form-control" id="email" name="email" placeholder="Enter email" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="password" class="form-label">Create Password</label>
                                <input type="password" class="form-control" id="password" name="password" placeholder="Create password" minlength="8" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="car_make" class="form-label">Car Make</label>
                                <input type="text" class="form-control" id="car_make" name="car_make" placeholder="e.g. Toyota" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="car_model" class="form-label">Car Model</label>
                                <input type="text" class="form-control" id="car_model" name="car_model" placeholder="e.g. Innova" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="reg_number" class="form-label">Registration Number</label>
                                <input type="text" class="form-control" id="reg_number" name="reg_number" placeholder="Enter registration number" required>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="aadhaar_number" class="form-label">Aadhaar Number</label>
                                <input type="text" class="form-control" id="aadhaar_number" name="aadhaar_number" placeholder="Enter 12-digit Aadhaar" pattern="\d{12}" maxlength="12" required>
                            </div>
                        </div>
                        <div class="row">
                            <div class="col-md-4 mb-3">
                                <label for="licence_img" class="form-label">Licence Image</label>
                                <input type="file" class="form-control" id="licence_img" name="licence_img" accept="image/*" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="rc_img" class="form-label">RC Image</label>
                                <input type="file" class="form-control" id="rc_img" name="rc_img" accept="image/*" required>
                            </div>
                            <div class="col-md-4 mb-3">
                                <label for="aadhaar_img" class="form-label">Aadhaar Image</label>
                                <input type="file" class="form-control" id="aadhaar_img" name="aadhaar_img" accept="image/*" required>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Create Account</button>
                    </form>
                    <div class="text-center mt-4">
                        <p class="mb-1 text-muted">Already registered?</p>
                        <a href="{{ url_for('driver_login') }}" class="btn btn-outline-primary">Driver Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
