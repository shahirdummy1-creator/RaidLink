<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Driver Signup – Step 1</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #f0f4f8; font-family: 'Segoe UI', sans-serif; }
        .step-card { max-width: 560px; margin: 48px auto; background: #fff; border-radius: 20px; box-shadow: 0 4px 24px rgba(0,0,0,.08); padding: 40px; }
        .step-indicator { display: flex; align-items: center; justify-content: center; gap: 0; margin-bottom: 32px; }
        .step-dot {
            width: 36px; height: 36px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center;
            font-size: .82rem; font-weight: 700;
        }
        .step-dot.active  { background: #0d6efd; color: #fff; }
        .step-dot.done    { background: #198754; color: #fff; }
        .step-dot.pending { background: #e5e7eb; color: #9ca3af; }
        .step-line { width: 60px; height: 3px; background: #e5e7eb; }
        .step-line.done { background: #198754; }
        .step-title { font-size: 1.3rem; font-weight: 700; color: #111827; margin-bottom: 6px; }
        .step-sub   { font-size: .85rem; color: #6b7280; margin-bottom: 28px; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold" href="{{ url_for('welcome') }}">RaidLink Technologies</a>
    </div>
</nav>

<div class="container">
    <div class="step-card">
        <!-- Step indicator -->
        <div class="step-indicator">
            <div class="step-dot active">1</div>
            <div class="step-line"></div>
            <div class="step-dot pending">2</div>
            <div class="step-line"></div>
            <div class="step-dot pending">3</div>
        </div>

        <div class="step-title">Personal Information</div>
        <div class="step-sub">Step 1 of 3 — Enter your basic details</div>

        {% if error %}
        <div class="alert alert-danger py-2">{{ error }}</div>
        {% endif %}

        <!-- Profile photo -->
        <div class="text-center mb-4">
            <div style="position:relative;display:inline-block;">
                <img id="photoPreview"
                     src="https://ui-avatars.com/api/?name=Driver&background=0d6efd&color=fff&size=120&rounded=true"
                     style="width:100px;height:100px;border-radius:50%;object-fit:cover;border:4px solid #0d6efd;cursor:pointer;"
                     onclick="document.getElementById('profile_photo').click()">
                <label for="profile_photo"
                       style="position:absolute;bottom:2px;right:2px;width:28px;height:28px;background:#0d6efd;border-radius:50%;display:flex;align-items:center;justify-content:center;cursor:pointer;border:2px solid #fff;">
                    <i class="bi bi-camera-fill text-white" style="font-size:.75rem;"></i>
                </label>
                <input type="file" class="d-none" id="profile_photo" name="profile_photo_preview" accept="image/*" onchange="previewPhoto(this)" required>
            </div>
            <div class="mt-2 text-muted" style="font-size:.78rem;">Click to upload profile photo <span class="text-danger">*</span></div>
        </div>

        <form method="POST" action="{{ url_for('driver_signup_step1') }}" enctype="multipart/form-data">
            <div class="mb-3">
                <label class="form-label fw-semibold">Username</label>
                <input type="text" class="form-control" name="username" placeholder="Choose a username" value="{{ form.username or '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Mobile Number</label>
                <input type="tel" class="form-control" name="mobile" placeholder="Enter mobile number" value="{{ form.mobile or '' }}" required>
            </div>
            <div class="mb-3">
                <label class="form-label fw-semibold">Email ID</label>
                <input type="email" class="form-control" name="email" placeholder="Enter email address" value="{{ form.email or '' }}" required>
            </div>
            <div class="mb-4">
                <label class="form-label fw-semibold">Password</label>
                <div class="input-group">
                    <input type="password" class="form-control" id="password" name="password" placeholder="Create password" minlength="8" required>
                    <button type="button" class="btn btn-outline-secondary" onclick="togglePw()">
                        <i class="bi bi-eye" id="pwIcon"></i>
                    </button>
                </div>
            </div>
            
            <div class="mb-4">
                <label class="form-label fw-semibold">Admin Name</label>
                <input type="text" class="form-control" name="admin_name" 
                       placeholder="Enter admin name" 
                       value="{{ form.admin_name or '' }}">
            </div>
            <!-- Hidden profile photo carried forward -->
            <input type="file" class="d-none" id="profile_photo_real" name="profile_photo" accept="image/*" required>
            
            <div class="alert alert-info mb-3">
                <i class="bi bi-info-circle me-2"></i>
                <strong>Next:</strong> After submitting your details, you'll need to pay ₹50 joining fee to continue registration.
            </div>
            
            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                Continue to Payment <i class="bi bi-arrow-right ms-1"></i>
            </button>
        </form>

        <div class="text-center mt-3">
            <small class="text-muted">Already registered? <a href="{{ url_for('driver_login') }}">Login</a></small>
        </div>
    </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePw() {
    const inp = document.getElementById('password');
    const ico = document.getElementById('pwIcon');
    inp.type = inp.type === 'password' ? 'text' : 'password';
    ico.className = inp.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
function previewPhoto(input) {
    if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = e => document.getElementById('photoPreview').src = e.target.result;
        reader.readAsDataURL(input.files[0]);
        // copy file to real input
        const dt = new DataTransfer();
        dt.items.add(input.files[0]);
        document.getElementById('profile_photo_real').files = dt.files;
    }
}

// Form validation
document.querySelector('form').addEventListener('submit', function(e) {
    const profilePhotoInput = document.getElementById('profile_photo_real');
    if (!profilePhotoInput.files || profilePhotoInput.files.length === 0) {
        e.preventDefault();
        alert('Profile photo is required. Please upload a profile picture.');
        document.getElementById('profile_photo').click();
        return false;
    }
});
</script>
</body>
</html>
