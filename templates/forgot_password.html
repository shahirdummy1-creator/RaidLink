<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password - PAYANUM</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <style>
        body { background: #fbbf24; font-family: 'Segoe UI', sans-serif; }
        body {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
        }
        .forgot-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .brand-logo {
            font-size: 2.5rem;
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            font-weight: 800;
        }
        .form-control {
            border-radius: 12px;
            border: 2px solid #e9ecef;
            padding: 12px 16px;
            transition: all 0.3s ease;
        }
        .form-control:focus {
            border-color: #0d6efd;
            box-shadow: 0 0 0 0.2rem rgba(13, 110, 253, 0.25);
        }
        .btn-primary {
            background: linear-gradient(135deg, #0d6efd, #6610f2);
            border: none;
            border-radius: 12px;
            padding: 12px 24px;
            font-weight: 600;
            transition: all 0.3s ease;
        }
        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(13, 110, 253, 0.3);
        }
        .user-type-selector {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }
        .user-type-btn {
            flex: 1;
            padding: 10px;
            border: 2px solid #e9ecef;
            border-radius: 10px;
            background: white;
            cursor: pointer;
            transition: all 0.3s ease;
            text-align: center;
        }
        .user-type-btn.active {
            border-color: #0d6efd;
            background: #f8f9ff;
            color: #0d6efd;
        }
        .user-type-btn:hover {
            border-color: #0d6efd;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-md-6 col-lg-5">
                <div class="forgot-card p-5">
                    <div class="text-center mb-4">
                        <div class="brand-logo">🚕 PAYANUM</div>
                        <h3 class="mt-3 mb-2">Forgot Password?</h3>
                        <p class="text-muted">Enter your email to reset your password</p>
                    </div>

                    {% if error %}
                    <div class="alert alert-danger d-flex align-items-center" role="alert">
                        <i class="bi bi-exclamation-triangle-fill me-2"></i>
                        {{ error }}
                    </div>
                    {% endif %}

                    {% if success %}
                    <div class="alert alert-success d-flex align-items-center" role="alert">
                        <i class="bi bi-check-circle-fill me-2"></i>
                        {{ success }}
                    </div>
                    <div class="text-center mt-4">
                        <a href="{{ url_for('rider_login') if user_type == 'rider' else url_for('driver_login') if user_type == 'driver' else url_for('admin_login') }}" class="btn btn-outline-primary">
                            <i class="bi bi-arrow-left me-2"></i>Back to Login
                        </a>
                    </div>
                    {% else %}
                    <form method="POST">
                        <!-- User Type Selection -->
                        <div class="user-type-selector">
                            <div class="user-type-btn {{ 'active' if user_type == 'rider' else '' }}" onclick="selectUserType('rider')">
                                <i class="bi bi-person-circle d-block mb-1"></i>
                                <small>Rider</small>
                            </div>
                            <div class="user-type-btn {{ 'active' if user_type == 'driver' else '' }}" onclick="selectUserType('driver')">
                                <i class="bi bi-car-front d-block mb-1"></i>
                                <small>Driver</small>
                            </div>
                            <div class="user-type-btn {{ 'active' if user_type == 'admin' else '' }}" onclick="selectUserType('admin')">
                                <i class="bi bi-shield-check d-block mb-1"></i>
                                <small>Admin</small>
                            </div>
                        </div>
                        
                        <input type="hidden" name="user_type" id="userTypeInput" value="{{ user_type }}">

                        <div class="mb-4">
                            <label for="email" class="form-label">Email Address</label>
                            <div class="input-group">
                                <span class="input-group-text bg-light border-end-0" style="border-radius: 12px 0 0 12px; border: 2px solid #e9ecef; border-right: none;">
                                    <i class="bi bi-envelope text-muted"></i>
                                </span>
                                <input type="email" class="form-control border-start-0" id="email" name="email" 
                                       placeholder="Enter your email address" required
                                       style="border-radius: 0 12px 12px 0; border-left: none;">
                            </div>
                        </div>

                        <button type="submit" class="btn btn-primary w-100 mb-3">
                            <i class="bi bi-send me-2"></i>Send Reset Link
                        </button>
                    </form>

                    <div class="text-center">
                        <p class="mb-2">Remember your password?</p>
                        <a href="{{ url_for('rider_login') if user_type == 'rider' else url_for('driver_login') if user_type == 'driver' else url_for('admin_login') }}" class="text-decoration-none">
                            <i class="bi bi-arrow-left me-1"></i>Back to Login
                        </a>
                    </div>
                    {% endif %}
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        function selectUserType(type) {
            // Update visual selection
            document.querySelectorAll('.user-type-btn').forEach(btn => {
                btn.classList.remove('active');
            });
            event.target.closest('.user-type-btn').classList.add('active');
            
            // Update hidden input
            document.getElementById('userTypeInput').value = type;
        }
    </script>
</body>
</html>
