<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outstation Cab Booking | PAYANUM – Tamil Nadu Intercity Taxi</title>
    <meta name="description" content="Book affordable outstation cab from Chennai, Trichy, Madurai and Coimbatore. PAYANUM offers reliable one-way and round-trip intercity taxi across Tamil Nadu.">
    <meta name="keywords" content="outstation cab Tamil Nadu, intercity taxi, one way cab, Chennai to Trichy cab, Chennai to Madurai taxi, outstation taxi booking">
    <meta name="robots" content="index, follow">
    <meta name="author" content="PAYANUM">
    <link rel="canonical" href="https://PAYANUM-production.up.railway.app/outstation">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #fbbf24 !important; font-family: 'Segoe UI', sans-serif; }

        #fullscreenMapOverlay {
            display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            z-index: 9999; background: #000; flex-direction: column;
        }
        #fullscreenMapOverlay.show { display: flex; }
        #fullscreenMap { flex: 1; width: 100%; }

        .fs-topbar {
            background: #0d6efd; padding: 10px 14px;
            display: flex; align-items: center; justify-content: space-between; gap: 10px; z-index: 10000;
        }
        .fs-topbar input { flex: 1; border-radius: 8px 0 0 8px; border: none; padding: 8px 12px; font-size: .9rem; outline: none; }
        .fs-search-btn { background: #fff; border: none; border-radius: 0 8px 8px 0; padding: 8px 14px; color: #0d6efd; font-size: 1rem; cursor: pointer; flex-shrink: 0; }
        .fs-search-btn:hover { background: #e9ecef; }
        .fs-exit-btn { background: rgba(255,255,255,.2); border: none; color: #fff; border-radius: 8px; padding: 8px 14px; font-weight: 700; font-size: .9rem; cursor: pointer; white-space: nowrap; }
        .fs-exit-btn:hover { background: rgba(255,255,255,.35); }

        .fs-bottombar {
            background: #fff; padding: 12px 14px; display: flex; gap: 10px; z-index: 10000;
            box-shadow: 0 -4px 16px rgba(0,0,0,.12); position: absolute;
            bottom: 60px; left: 16px; right: 16px; border-radius: 14px;
        }
        .fs-bottombar button { flex: 1; padding: 12px; border-radius: 10px; font-weight: 700; font-size: .9rem; border: none; cursor: pointer; }
        .fs-btn-pickup { background: #22c55e; color: #fff; }
        .fs-btn-drop   { background: #ef4444; color: #fff; }
        .fs-btn-pickup:hover { background: #16a34a; }
        .fs-btn-drop:hover   { background: #dc2626; }

        .fs-crosshair { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -100%); font-size: 2rem; z-index: 10000; pointer-events: none; filter: drop-shadow(0 2px 4px rgba(0,0,0,.4)); }
        .fs-map-wrap { position: relative; flex: 1; display: flex; flex-direction: column; }

        #fsSearchResults { position: fixed; top: 56px; left: 0; right: 0; background: #fff; z-index: 10010; max-height: 260px; overflow-y: auto; display: none; box-shadow: 0 8px 24px rgba(0,0,0,.3); }
        #fsSearchResults.show { display: block; }
        .fs-search-item { padding: 12px 16px; cursor: pointer; border-bottom: 1px solid #f3f4f6; font-size: .88rem; display: flex; align-items: flex-start; gap: 10px; }
        .fs-search-item:hover { background: #eff6ff; }

        .fs-btn-locate { position: absolute; top: 110px; left: 10px; background: #fff; color: #333; border: 2px solid rgba(0,0,0,0.2); border-radius: 4px; width: 38px; height: 38px; display: flex; align-items: center; justify-content: center; font-size: 1.1rem; cursor: pointer; box-shadow: 0 1px 5px rgba(0,0,0,.4); z-index: 10001; flex-shrink: 0; }
        .fs-btn-locate:hover { background: #f4f4f4; }

        body.map-fullscreen .hide-on-map { display: none !important; }

        .autocomplete-wrap { position: relative; }
        .autocomplete-list { position: absolute; top: 100%; left: 0; right: 0; z-index: 9999; background: #fff; border: 1px solid #e5e7eb; border-radius: 0 0 10px 10px; box-shadow: 0 8px 24px rgba(0,0,0,.12); max-height: 220px; overflow-y: auto; display: none; }
        .autocomplete-list.show { display: block; }
        .autocomplete-item { padding: 10px 14px; cursor: pointer; font-size: .88rem; border-bottom: 1px solid #f3f4f6; display: flex; align-items: flex-start; gap: 10px; }
        .autocomplete-item:hover { background: #eff6ff; }
        .place-name { font-weight: 600; color: #111827; }
        .place-addr { font-size: .75rem; color: #6b7280; margin-top: 2px; }
        .loc-badge { display: inline-flex; align-items: center; gap: 6px; background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; font-size: .78rem; font-weight: 600; padding: 4px 10px; border-radius: 20px; margin-top: 4px; }

        .section-label { font-size: .72rem; font-weight: 700; text-transform: uppercase; letter-spacing: .08em; color: #374151; margin-bottom: 6px; }
        .distance-badge { background: #eff6ff; border: 1px solid #bfdbfe; border-radius: 10px; padding: 12px 16px; display: flex; align-items: center; justify-content: space-between; }

        @media (max-width: 576px) {
            .booking-card { padding: 16px !important; }
            .btn { min-height: 48px; font-size: 1rem; }
            .btn-sm { min-height: 44px; font-size: .9rem; }
            .form-control { min-height: 48px; font-size: 1rem; }
            .fs-bottombar button { min-height: 52px; font-size: 1rem; }
            .fs-topbar input { min-height: 44px; font-size: 1rem; }
            .fs-search-btn { min-height: 44px; padding: 8px 16px; }
        }
    </style>
</head>
<body>

<nav class="navbar navbar-dark bg-primary hide-on-map">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold" href="{{ url_for('welcome') }}">PAYANUM</a>
    </div>
</nav>

<main>
<div class="container py-4">
    <div class="row g-4 align-items-start">
        <div class="col-12 col-lg-8 mx-auto">
            <span id="map-distance-label" class="d-none"></span>
            <small id="map-mode-hint" class="d-none"></small>
            <div class="booking-card">
                <div class="d-flex justify-content-between align-items-center mb-4">
                    <h4 class="fw-bold mb-0">Outstation Booking</h4>
                    <a href="{{ url_for('book', username=username) }}" class="btn btn-outline-secondary btn-sm fw-bold">
                        <i class="bi bi-arrow-left me-1"></i> Back
                    </a>
                </div>

                <form action="/submit" method="POST">
                    <input type="hidden" name="username" value="{{ username }}">
                    <input type="hidden" id="pickup_pincode" name="pickup_pincode">
                    <input type="hidden" id="drop_pincode"   name="drop_pincode">

                    <!-- From City -->
                    <div class="mb-3">
                        <div class="section-label"><i class="bi bi-geo-alt-fill text-success me-1"></i>From City</div>
                        <div class="autocomplete-wrap">
                            <div class="input-group">
                                <input type="text" class="form-control" id="pickup" name="pickup"
                                       placeholder="Search departure city..." required autocomplete="off">
                                <button type="button" class="btn btn-success" onclick="openFullscreenMap('pickup')" title="Choose from map" aria-label="Choose pickup from map">
                                    <i class="bi bi-map"></i>
                                </button>
                            </div>
                            <div class="autocomplete-list" id="pickup-list"></div>
                        </div>
                        <div id="pickup-badge"></div>
                    </div>

                    <!-- Destination -->
                    <div class="mb-3">
                        <div class="section-label"><i class="bi bi-flag-fill text-danger me-1"></i>Destination City</div>
                        <div class="autocomplete-wrap">
                            <div class="input-group">
                                <input type="text" class="form-control" id="drop" name="drop"
                                       placeholder="Search destination city..." required autocomplete="off">
                                <button type="button" class="btn btn-danger" onclick="openFullscreenMap('drop')" title="Choose from map" aria-label="Choose drop from map">
                                    <i class="bi bi-map"></i>
                                </button>
                            </div>
                            <div class="autocomplete-list" id="drop-list"></div>
                        </div>
                        <div id="drop-badge"></div>
                    </div>

                    <!-- Distance & Fare -->
                    <div class="mb-3">
                        <div class="distance-badge">
                            <div>
                                <div class="section-label mb-1">Total Distance</div>
                                <div class="d-flex align-items-baseline gap-1">
                                    <input type="number" id="distance" name="distance" step="0.1"
                                           class="form-control form-control-sm border-0 p-0 fw-bold bg-transparent"
                                           placeholder="—" style="width:80px;font-size:1.4rem;" required>
                                    <span class="text-muted fw-semibold">km</span>
                                </div>
                                <small class="text-muted">Auto-calculated via road route</small>
                            </div>
                            <div class="text-end">
                                <div class="section-label mb-1">Estimated Fare</div>
                                <div id="fare-display" class="fw-bold text-success" style="font-size:1.4rem;">—</div>
                                <input type="hidden" id="fare" name="fare">
                            </div>
                        </div>
                    </div>

                    <!-- Price per km -->
                    <div class="mb-3">
                        <div class="section-label">Price per km (₹)</div>
                        <input type="number" class="form-control" id="price_per_km" value="18" step="0.5" min="1" oninput="recalcFare()">
                        <small class="text-muted">Default ₹18/km for outstation</small>
                    </div>

                    <!-- Date & Time -->
                    <div class="row g-3 mb-4">
                        <div class="col-6">
                            <label for="ride_date" class="section-label">Ride Date</label>
                            <input type="date" class="form-control" id="ride_date" name="ride_date" required>
                        </div>
                        <div class="col-6">
                            <label for="ride_time" class="section-label">Ride Time</label>
                            <input type="time" class="form-control" id="ride_time" name="ride_time" required>
                        </div>
                    </div>

                    <button type="submit" class="btn btn-warning w-100 fw-bold py-2 mb-2">
                        <i class="bi bi-check-circle me-1"></i> Book Outstation
                    </button>
                    <div class="d-flex gap-2">
                        <a href="{{ url_for('rider_bookings', username=username) }}" class="btn btn-primary w-100 fw-bold py-2" style="min-height:48px;display:flex;align-items:center;justify-content:center;">
                            <i class="bi bi-list-ul me-1"></i> My Bookings
                        </a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
</main>

<!-- Fullscreen Map Overlay -->
<div id="fullscreenMapOverlay">
    <div class="fs-topbar">
        <input type="text" id="fsSearchInput" placeholder="Search location..." autocomplete="off">
        <button class="fs-search-btn" onmousedown="event.preventDefault(); triggerFsSearch();" aria-label="Search">
            <i class="bi bi-search"></i>
        </button>
        <button class="fs-exit-btn" onclick="closeFullscreenMap()" aria-label="Close map">
            <i class="bi bi-x-lg"></i> Exit
        </button>
    </div>
    <div id="fsSearchResults"></div>
    <div class="fs-map-wrap">
        <div id="fullscreenMap"></div>
        <div class="fs-crosshair" id="fsCrosshair">📍</div>
        <button class="fs-btn-locate" onclick="locateMe()" title="My Location" aria-label="My Location">
            <i class="bi bi-crosshair"></i>
        </button>
    </div>
    <div class="fs-bottombar">
        <button class="fs-btn-pickup" onclick="setLocationFromFullscreen('pickup')">
            <i class="bi bi-geo-alt-fill me-1"></i> Set as From
        </button>
        <button class="fs-btn-drop" onclick="setLocationFromFullscreen('drop')">
            <i class="bi bi-flag-fill me-1"></i> Set as Destination
        </button>
    </div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
const coords = { pickup: null, drop: null };

const greenIcon = L.icon({ iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-green.png', shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png', iconSize:[25,41], iconAnchor:[12,41] });
const redIcon   = L.icon({ iconUrl:'https://raw.githubusercontent.com/pointhi/leaflet-color-markers/master/img/marker-icon-2x-red.png',   shadowUrl:'https://unpkg.com/leaflet@1.9.4/dist/images/marker-shadow.png', iconSize:[25,41], iconAnchor:[12,41] });

document.addEventListener('DOMContentLoaded', function () {
    const now = new Date();
    document.getElementById('ride_date').value = now.toISOString().split('T')[0];
    document.getElementById('ride_time').value = now.toTimeString().substring(0, 5);
    document.getElementById('distance').addEventListener('input', recalcFare);
});

function haversineKm(lat1, lon1, lat2, lon2) {
    const R = 6371, r = x => x * Math.PI / 180;
    const a = Math.sin(r(lat2-lat1)/2)**2 + Math.cos(r(lat1))*Math.cos(r(lat2))*Math.sin(r(lon2-lon1)/2)**2;
    return R * 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
}

function recalcFare() {
    const dist = parseFloat(document.getElementById('distance').value);
    const rate = parseFloat(document.getElementById('price_per_km').value) || 18;
    if (!isNaN(dist) && dist > 0) {
        const fareVal = Math.max(dist * rate, 200);
        document.getElementById('fare').value = fareVal.toFixed(2);
        document.getElementById('fare-display').textContent = '\u20b9' + fareVal.toFixed(2);
    } else {
        document.getElementById('fare').value = '';
        document.getElementById('fare-display').textContent = '\u2014';
    }
}

function updateMap() {
    if (!coords.pickup || !coords.drop) return;
    const [plat, plng] = coords.pickup;
    const [dlat, dlng] = coords.drop;
    document.getElementById('fare-display').textContent = '\u23f3 Calculating...';
    fetch(`https://router.project-osrm.org/route/v1/driving/${plng},${plat};${dlng},${dlat}?overview=false`)
        .then(r => r.json())
        .then(data => {
            const metres = data?.routes?.[0]?.distance;
            const km = metres && metres > 0 ? (metres/1000).toFixed(1) : (haversineKm(plat,plng,dlat,dlng)*1.3).toFixed(1);
            document.getElementById('distance').value = km;
            recalcFare();
        })
        .catch(() => {
            const km = (haversineKm(plat,plng,dlat,dlng)*1.3).toFixed(1);
            document.getElementById('distance').value = km;
            recalcFare();
        });
}

// ── Autosuggest ───────────────────────────────────────────
const timers = {};
['pickup','drop'].forEach(type => {
    document.getElementById(type).addEventListener('input', function () {
        clearTimeout(timers[type]);
        const val = this.value.trim();
        if (val.length < 3) {
            closeList(type);
            coords[type] = null;
            document.getElementById(type+'-badge').innerHTML = '';
            document.getElementById('distance').value = '';
            document.getElementById('fare').value = '';
            document.getElementById('fare-display').textContent = '\u2014';
            return;
        }
        timers[type] = setTimeout(() => fetchSuggestions(val, type), 400);
    });
    document.getElementById(type).addEventListener('blur', () => setTimeout(() => closeList(type), 200));
});

async function fetchSuggestions(query, type) {
    try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+', India')}&format=json&limit=6&addressdetails=1`, { headers:{'Accept-Language':'en'} });
        const data = await res.json();
        if (!data.length) { closeList(type); return; }
        const list = document.getElementById(type+'-list');
        list._data = data;
        list.innerHTML = data.map((p,i) => {
            const name = p.display_name.split(',')[0];
            const addr = p.display_name.split(',').slice(1,3).join(',').trim();
            return `<div class="autocomplete-item" onmousedown="selectPlace(${i},'${type}')">
                        <i class="bi bi-geo-alt text-primary mt-1"></i>
                        <div><div class="place-name">${name}</div><div class="place-addr">${addr}</div></div>
                    </div>`;
        }).join('');
        list.classList.add('show');
    } catch { closeList(type); }
}

function selectPlace(idx, type) {
    const list  = document.getElementById(type+'-list');
    const place = list._data[idx];
    const lat = parseFloat(place.lat), lng = parseFloat(place.lon);
    if (isNaN(lat)||isNaN(lng)) return;
    const name = place.display_name.split(',')[0];
    const addr = place.display_name.split(',').slice(1,3).join(',').trim();
    document.getElementById(type).value = name;
    document.getElementById(type+'_pincode').value = place.address?.postcode || '';
    coords[type] = [lat, lng];
    document.getElementById(type+'-badge').innerHTML = `<span class="loc-badge"><i class="bi bi-check-circle-fill"></i>${addr||name}</span>`;
    closeList(type);
    updateMap();
}

function closeList(type) {
    const list = document.getElementById(type+'-list');
    list.classList.remove('show');
    list.innerHTML = '';
}

document.addEventListener('click', e => {
    ['pickup','drop'].forEach(type => {
        const wrap = document.getElementById(type).closest('.autocomplete-wrap');
        if (wrap && !wrap.contains(e.target)) closeList(type);
    });
});

// ── Fullscreen Map ────────────────────────────────────────
let fsMap = null, fsLocationMarker = null;

function openFullscreenMap(presetType) {
    document.getElementById('fullscreenMapOverlay').classList.add('show');
    document.body.classList.add('map-fullscreen');
    const pickup = document.querySelector('.fs-btn-pickup');
    const drop   = document.querySelector('.fs-btn-drop');
    if (presetType === 'pickup') { pickup.style.outline = '3px solid #fff'; drop.style.outline = ''; }
    else                         { drop.style.outline   = '3px solid #fff'; pickup.style.outline = ''; }

    if (!fsMap) {
        fsMap = L.map('fullscreenMap').setView(coords.pickup || coords.drop || [20.5937, 78.9629], coords.pickup || coords.drop ? 14 : 5);
        L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { attribution: '&copy; OpenStreetMap', maxZoom: 19 }).addTo(fsMap);
        if (coords.pickup) L.marker(coords.pickup, { icon: greenIcon }).addTo(fsMap).bindPopup('From');
        if (coords.drop)   L.marker(coords.drop,   { icon: redIcon   }).addTo(fsMap).bindPopup('Destination');
    } else {
        fsMap.invalidateSize();
    }

    const fsInput = document.getElementById('fsSearchInput');
    fsInput.value = '';
    let fsTimer;
    fsInput.oninput = function() {
        clearTimeout(fsTimer);
        const q = this.value.trim();
        if (q.length < 3) { closeFsSearch(); return; }
        fsTimer = setTimeout(() => fetchFsSuggestions(q), 400);
    };
    fsInput.onkeydown = function(e) { if (e.key === 'Enter') { e.preventDefault(); triggerFsSearch(); } };
}

function closeFullscreenMap() {
    document.getElementById('fullscreenMapOverlay').classList.remove('show');
    document.body.classList.remove('map-fullscreen');
    closeFsSearch();
    if (fsMap) fsMap.invalidateSize();
}

async function setLocationFromFullscreen(type) {
    const center = fsMap.getCenter();
    const lat = center.lat, lng = center.lng;
    closeFullscreenMap();
    try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&addressdetails=1`, { headers:{'Accept-Language':'en'} });
        const data = await res.json();
        const name = data.address?.city || data.address?.town || data.address?.village || data.display_name.split(',')[0];
        const addr = data.display_name.split(',').slice(1,3).join(',').trim();
        document.getElementById(type).value = name;
        document.getElementById(type+'_pincode').value = data.address?.postcode || '';
        coords[type] = [lat, lng];
        document.getElementById(type+'-badge').innerHTML = `<span class="loc-badge"><i class="bi bi-check-circle-fill"></i>${addr||name}</span>`;
        updateMap();
    } catch {
        document.getElementById(type).value = `${lat.toFixed(6)}, ${lng.toFixed(6)}`;
        coords[type] = [lat, lng];
        updateMap();
    }
}

async function fetchFsSuggestions(query) {
    try {
        const res  = await fetch(`https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(query+', India')}&format=json&limit=5`, { headers:{'Accept-Language':'en'} });
        const data = await res.json();
        const box  = document.getElementById('fsSearchResults');
        if (!data.length) { closeFsSearch(); return; }
        box._data = data;
        box.innerHTML = data.map((p,i) => {
            const name = p.display_name.split(',')[0];
            const addr = p.display_name.split(',').slice(1,3).join(',').trim();
            return `<div class="fs-search-item" onmousedown="selectFsResult(${i})">
                        <i class="bi bi-geo-alt-fill text-primary" style="font-size:1.1rem;"></i>
                        <div style="flex:1;">
                            <div style="font-weight:600;color:#111827;">${name}</div>
                            <div style="font-size:.75rem;color:#6b7280;margin-top:2px;">${addr}</div>
                        </div>
                    </div>`;
        }).join('');
        box.classList.add('show');
    } catch { closeFsSearch(); }
}

function selectFsResult(idx) {
    const box = document.getElementById('fsSearchResults');
    const place = box._data[idx];
    const lat = parseFloat(place.lat), lng = parseFloat(place.lon);
    if (isNaN(lat)||isNaN(lng)) return;
    fsMap.setView([lat, lng], 15);
    document.getElementById('fsSearchInput').value = place.display_name.split(',')[0];
    closeFsSearch();
}

function triggerFsSearch() {
    const q = document.getElementById('fsSearchInput').value.trim();
    if (q.length >= 1) fetchFsSuggestions(q);
}

function closeFsSearch() {
    const box = document.getElementById('fsSearchResults');
    box.classList.remove('show');
    box.innerHTML = '';
}

function locateMe() {
    if (!navigator.geolocation) { alert('GPS not supported.'); return; }
    const btn = document.querySelector('.fs-btn-locate');
    btn.innerHTML = '<i class="bi bi-arrow-repeat" style="animation:spin .8s linear infinite"></i>';
    navigator.geolocation.getCurrentPosition(
        pos => {
            const lat = pos.coords.latitude, lng = pos.coords.longitude;
            if (fsLocationMarker) fsMap.removeLayer(fsLocationMarker);
            fsLocationMarker = L.circleMarker([lat, lng], { radius:10, color:'#0d6efd', fillColor:'#0d6efd', fillOpacity:.8, weight:3 }).addTo(fsMap).bindPopup('<b>📍 Your Location</b>').openPopup();
            fsMap.setView([lat, lng], 16);
            btn.innerHTML = '<i class="bi bi-crosshair"></i>';
        },
        () => { alert('Could not get your location.'); btn.innerHTML = '<i class="bi bi-crosshair"></i>'; },
        { enableHighAccuracy: true, timeout: 8000 }
    );
}
</script>
</body>
</html>
