<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Outstation Booking</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>

<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="#">RaidLink Technologies</a>
    </div>
</nav>

<section class="py-5" style="background-color:white;">
    <div class="container">
        <div class="row align-items-center">

            <!-- Left -->
            <div class="col-lg-6 text-center mb-4 mb-lg-0">
                <h1 class="fw-bold mb-3">Outstation Booking</h1>
                <p class="text-muted mb-4">Plan your intercity trip with ease.</p>
                <div style="background:#fff;padding:20px;border-radius:15px;display:inline-block;">
                    <img src="{{ url_for('static', filename='images/car.png') }}"
                         class="img-fluid" alt="Taxi Car" style="max-width:70%;border-radius:10px;">
                </div>
            </div>

            <!-- Right -->
            <div class="col-lg-6 d-flex justify-content-center">
                <div class="card shadow-lg p-4 rounded-4" style="width:85%;">
                    <h3 class="card-title text-center mb-4 fw-bold">
                        <i class="bi bi-signpost-2 me-2 text-primary"></i>Outstation Trip
                    </h3>
                    <form action="/submit" method="POST">
                        <input type="hidden" name="username" value="{{ username }}">

                        <div class="mb-3">
                            <label class="form-label fw-semibold">From City</label>
                            <input type="text" class="form-control" name="pickup"
                                   placeholder="Enter departure city" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Destination City</label>
                            <input type="text" class="form-control" name="drop"
                                   placeholder="Enter destination city" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Total Distance (km)</label>
                            <input type="number" class="form-control" id="distance" name="distance"
                                   placeholder="Enter total kilometers" step="0.1" min="1" required
                                   oninput="calcFare()">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Price per Kilometer (₹)</label>
                            <input type="number" class="form-control" id="price_per_km"
                                   placeholder="Enter price per km" step="0.1" min="1" required
                                   oninput="calcFare()">
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Total Fare</label>
                            <input type="text" class="form-control" id="fare" name="fare"
                                   placeholder="Auto-calculated" readonly>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Ride Date</label>
                            <input type="date" class="form-control" id="ride_date" name="ride_date" required>
                        </div>

                        <div class="mb-3">
                            <label class="form-label fw-semibold">Ride Time</label>
                            <input type="time" class="form-control" id="ride_time" name="ride_time" required>
                        </div>

                        <div class="d-flex gap-2">
                            <button type="submit" class="btn btn-primary w-100 fw-bold py-2">
                                <i class="bi bi-check-circle me-1"></i> Book Outstation
                            </button>
                            <a href="{{ url_for('book', username=username) }}"
                               class="btn btn-outline-secondary w-100 fw-bold py-2">
                                <i class="bi bi-arrow-left me-1"></i> Back
                            </a>
                        </div>
                    </form>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
    const now = new Date();
    document.getElementById('ride_date').value = now.toISOString().split('T')[0];
    document.getElementById('ride_time').value = now.toTimeString().substring(0, 5);

    function calcFare() {
        const dist = parseFloat(document.getElementById('distance').value);
        const rate = parseFloat(document.getElementById('price_per_km').value);
        if (!isNaN(dist) && !isNaN(rate) && dist > 0 && rate > 0) {
            const fareVal = Math.max(dist * rate, 200);
            document.getElementById('fare').value = fareVal.toFixed(2);
        } else {
            document.getElementById('fare').value = '';
        }
    }
</script>
</body>
</html>
