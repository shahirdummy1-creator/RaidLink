<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Login – PAYANUM | Online Cab Booking Tamil Nadu</title>
    <meta name="description" content="Login to PAYANUM and book affordable taxi in Chennai, Trichy and across Tamil Nadu. Local cab, outstation cab and airport taxi available 24/7.">
    <meta name="keywords" content="online cab booking, taxi service, airport taxi, local cab, outstation cab, taxi booking in Chennai, cab service in Trichy, affordable taxi Tamil Nadu">
    <meta name="robots" content="index, follow">
    <meta name="author" content="PAYANUM">
    <link rel="canonical" href="https://PAYANUM-production.up.railway.app/rider-login">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: #fbbf24 !important; font-family: 'Segoe UI', sans-serif; }
        .hero-section { background-color: #fbbf24 !important; }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="{{ url_for('welcome') }}">PAYANUM</a>
    </div>
</nav>

<section class="hero-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card shadow-lg p-4 rounded-4 login-card mx-auto">
                    <div class="text-start mb-2">
                        <a href="{{ url_for('welcome') }}" class="btn btn-sm btn-primary fw-bold"
                           style="border:none;">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                    </div>
                    <h3 class="text-center mb-4 fw-bold">Rider Login</h3>

                    {% if success %}
                    <div class="alert alert-success py-2 text-center">
                        Account created successfully! Please log in.
                    </div>
                    {% endif %}

                    {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="{{ url_for('rider_login') }}">
                        <div class="mb-3 text-start">
                            <label for="mobile" class="form-label">Phone Number</label>
                            <input type="tel" class="form-control" id="mobile" name="mobile"
                                   placeholder="Enter your phone number" required autofocus
                                   inputmode="numeric" maxlength="10">
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Login</button>
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-1 text-muted">Don't have an account?</p>
                        <a href="{{ url_for('rider_signup') }}" class="btn btn-outline-primary">Create Rider Account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon  = btn.querySelector('i');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
