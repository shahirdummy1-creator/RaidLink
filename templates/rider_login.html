<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Rider Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container d-flex justify-content-between align-items-center">
        <a class="navbar-brand fw-bold" href="{{ url_for('welcome') }}">RaidLink Technologies</a>
        <div class="d-flex gap-2">
            <a href="{{ url_for('driver_login') }}" class="btn btn-outline-light btn-sm fw-bold">Driver Login</a>
            <a href="{{ url_for('admin_login') }}" class="btn btn-light btn-sm fw-bold text-primary">Admin</a>
        </div>
    </div>
</nav>

<section class="hero-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card shadow-lg p-4 rounded-4 login-card mx-auto">
                    <div class="text-start mb-2">
                        <a href="{{ url_for('welcome') }}" class="btn btn-sm btn-primary fw-bold"
                           style="border:none;">
                            <i class="bi bi-arrow-left"></i>
                        </a>
                    </div>
                    <h3 class="text-center mb-4 fw-bold">Rider Login</h3>

                    {% if success %}
                    <div class="alert alert-success py-2 text-center">
                        Account created successfully! Please log in.
                    </div>
                    {% endif %}

                    {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                    {% endif %}

                    <form method="POST" action="{{ url_for('rider_login') }}">
                        <div class="mb-3 text-start">
                            <label for="username" class="form-label">Username</label>
                            <input type="text" class="form-control" id="username" name="username"
                                   placeholder="Enter your username" required autofocus>
                        </div>
                        <div class="mb-3 text-start">
                            <label for="password" class="form-label">Password</label>
                            <div class="input-group">
                                <input type="password" class="form-control" id="password" name="password"
                                       placeholder="Enter your password" required>
                                <button type="button" class="btn btn-outline-secondary" onclick="togglePassword('password', this)">
                                    <i class="bi bi-eye"></i>
                                </button>
                            </div>
                        </div>
                        <button type="submit" class="btn btn-primary w-100 fw-bold py-2">Login</button>
                    </form>

                    <div class="text-center mt-3">
                        <a href="{{ url_for('forgot_password', type='rider') }}" class="text-decoration-none">
                            <i class="bi bi-key me-1"></i>Forgot Password?
                        </a>
                    </div>

                    <div class="text-center mt-4">
                        <p class="mb-1 text-muted">Don't have an account?</p>
                        <a href="{{ url_for('rider_signup') }}" class="btn btn-outline-primary">Create Rider Account</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function togglePassword(id, btn) {
    const input = document.getElementById(id);
    const icon  = btn.querySelector('i');
    input.type = input.type === 'password' ? 'text' : 'password';
    icon.className = input.type === 'password' ? 'bi bi-eye' : 'bi bi-eye-slash';
}
</script>
</body>
</html>
