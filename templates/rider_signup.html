<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account | RaidLink – Online Cab Booking Tamil Nadu</title>
    <meta name="description" content="Create your RaidLink rider account and book affordable cab services in Chennai, Trichy, Coimbatore and across Tamil Nadu. 24/7 taxi available.">
    <meta name="robots" content="index, follow">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="{{ url_for('welcome') }}">RaidLink Technologies</a>
    </div>
</nav>

<section class="hero-section py-5">
    <div class="container">
        <div class="row justify-content-center">
            <div class="col-lg-5">
                <div class="card shadow-lg p-4 rounded-4 login-card mx-auto">
                    <h3 class="text-center mb-4 fw-bold">Create Rider Account</h3>

                    {% if error %}
                    <div class="alert alert-danger py-2">{{ error }}</div>
                    {% endif %}

                    <!-- Step 1: Name + Phone -->
                    <div id="step-details">
                        <div class="mb-3 text-start">
                            <label class="form-label">Full Name</label>
                            <input type="text" class="form-control" id="inp-name" placeholder="Enter your name" required autofocus>
                        </div>
                        <div class="mb-3 text-start">
                            <label class="form-label">Phone Number</label>
                            <div class="input-group">
                                <input type="tel" class="form-control" id="inp-mobile" placeholder="10-digit mobile number"
                                       inputmode="numeric" maxlength="10">
                                <button class="btn btn-outline-primary fw-bold" type="button" onclick="sendOtp()">Send OTP</button>
                            </div>
                            <div id="otp-msg" class="form-text"></div>
                        </div>
                    </div>

                    <!-- Step 2: OTP verify (hidden initially) -->
                    <div id="step-otp" style="display:none;">
                        <div class="alert alert-info py-2 text-center fw-bold" id="otp-display" style="display:none; font-size:1.1rem; letter-spacing:.1rem;"></div>
                        <div class="mb-3 text-start">
                            <label class="form-label">Enter OTP</label>
                            <input type="text" class="form-control text-center fw-bold" id="inp-otp"
                                   placeholder="0 0 0 0" maxlength="4" inputmode="numeric"
                                   style="font-size:1.6rem;letter-spacing:.5rem;">
                            <div id="otp-error" class="text-danger small mt-1" style="display:none;">Incorrect OTP. Try again.</div>
                        </div>
                        <button class="btn btn-success w-100 fw-bold py-2" onclick="verifyOtp()">Verify & Create Account</button>
                        <button class="btn btn-link w-100 mt-1" onclick="resendOtp()">Resend OTP</button>
                    </div>

                    <!-- Hidden form submitted after OTP verified -->
                    <form id="signup-form" method="POST" action="{{ url_for('rider_signup') }}" style="display:none;">
                        <input type="hidden" name="username" id="h-username">
                        <input type="hidden" name="mobile"   id="h-mobile">
                    </form>

                    <div class="text-center mt-4">
                        <p class="mb-1 text-muted">Already have an account?</p>
                        <a href="{{ url_for('rider_login') }}" class="btn btn-outline-primary">Login</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script>
function sendOtp() {
    const name   = document.getElementById('inp-name').value.trim();
    const mobile = document.getElementById('inp-mobile').value.trim();
    const msg    = document.getElementById('otp-msg');

    if (!name) { msg.className = 'text-danger small mt-1'; msg.textContent = 'Please enter your name.'; return; }
    if (!/^\d{10}$/.test(mobile)) { msg.className = 'text-danger small mt-1'; msg.textContent = 'Enter a valid 10-digit number.'; return; }

    msg.className = 'text-muted small mt-1';
    msg.textContent = 'Sending OTP...';

    fetch('/api/send-signup-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mobile })
    })
    .then(r => r.json())
    .then(data => {
        if (data.ok) {
            msg.className = 'text-success small mt-1';
            msg.textContent = 'OTP sent to ' + mobile;
            document.getElementById('step-otp').style.display = 'block';
            document.getElementById('inp-otp').focus();
            // Show OTP on screen
            const otpDisplay = document.getElementById('otp-display');
            otpDisplay.textContent = 'Your OTP: ' + data.otp;
            otpDisplay.style.display = 'block';
        } else {
            msg.className = 'text-danger small mt-1';
            msg.textContent = data.error || 'Failed to send OTP.';
        }
    })
    .catch(() => { msg.className = 'text-danger small mt-1'; msg.textContent = 'Network error. Try again.'; });
}

function resendOtp() { sendOtp(); }

function verifyOtp() {
    const otp    = document.getElementById('inp-otp').value.trim();
    const mobile = document.getElementById('inp-mobile').value.trim();
    const errEl  = document.getElementById('otp-error');

    fetch('/api/verify-signup-otp', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mobile, otp })
    })
    .then(r => r.json())
    .then(data => {
        if (data.valid) {
            const name = document.getElementById('inp-name').value.trim();
            document.getElementById('h-username').value = name;
            document.getElementById('h-mobile').value   = mobile;
            document.getElementById('signup-form').submit();
        } else {
            errEl.style.display = 'block';
            document.getElementById('inp-otp').value = '';
            setTimeout(() => errEl.style.display = 'none', 3000);
        }
    })
    .catch(() => { errEl.style.display = 'block'; });
}
</script>
</body>
</html>
