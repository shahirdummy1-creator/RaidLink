<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - RaidLink Taxi</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="#">RaidLink Technologies</a>
    </div>
</nav>

<section class="hero-section">
    <div class="container" style="min-height:90vh;display:flex;align-items:center;">
        <div class="row align-items-center w-100">

            <!-- Car image left -->
            <div class="col-lg-7 text-center mb-4 mb-lg-0">
                <h1 class="fw-bold mb-4">Welcome to RaidLink</h1>
                <img src="{{ url_for('static', filename='images/car.png') }}"
                     alt="RaidLink Taxi"
                     class="img-fluid"
                     style="max-height:380px;object-fit:contain;">
            </div>

            <!-- Access card right -->
            <div class="col-lg-5 d-flex justify-content-center">
                <div class="card shadow-lg p-4 rounded-4 role-card">
                    <h3 class="text-center mb-4 fw-bold">Choose Your Access</h3>
                    <div class="d-grid gap-3 welcome-buttons">
                        <a href="{{ url_for('rider_login') }}" class="btn btn-primary btn-lg fw-bold">Rider Login</a>
                        <a href="{{ url_for('driver_login') }}" class="btn btn-outline-primary btn-lg fw-bold">Driver Login</a>
                        <a href="{{ url_for('admin_login') }}" class="btn btn-secondary btn-lg fw-bold">Admin</a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
