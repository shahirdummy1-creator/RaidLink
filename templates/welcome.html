<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - RaidLink Taxi</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body {
            background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 100%);
            min-height: 100vh;
        }

        .hero-section {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            padding: 24px 0;
        }

        .car-img {
            width: 100%;
            max-width: 340px;
            height: auto;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(13,110,253,.18));
        }

        .welcome-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(13,110,253,.13);
            padding: 32px 28px;
            width: 100%;
            max-width: 380px;
        }

        .welcome-card .brand-badge {
            display: inline-block;
            background: #0d6efd;
            color: #fff;
            font-size: .78rem;
            font-weight: 700;
            padding: 4px 14px;
            border-radius: 20px;
            letter-spacing: .04em;
            margin-bottom: 10px;
        }

        .welcome-card h2 {
            font-size: 1.5rem;
            font-weight: 800;
            color: #111827;
            margin-bottom: 6px;
        }

        .welcome-card .subtitle {
            font-size: .85rem;
            color: #6b7280;
            margin-bottom: 28px;
        }

        .btn-login {
            padding: 13px;
            font-size: .95rem;
            font-weight: 700;
            border-radius: 12px;
        }

        /* Mobile: stack car above card, centered */
        @media (max-width: 991px) {
            .car-col { order: 1; margin-bottom: 20px; }
            .card-col { order: 2; }
            .car-img  { max-width: 220px; }
            .welcome-card { padding: 24px 20px; }
            .welcome-card h2 { font-size: 1.3rem; }
        }

        @media (max-width: 480px) {
            .car-img { max-width: 180px; }
            .welcome-card { padding: 20px 16px; }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold" href="#">🚕 RaidLink Technologies</a>
    </div>
</nav>

<section class="hero-section">
    <div class="container">
        <div class="row align-items-center justify-content-center g-4">

            <!-- Car image -->
            <div class="col-lg-6 text-center car-col">
                <img src="{{ url_for('static', filename='images/car.png') }}"
                     alt="RaidLink Taxi" class="car-img">
            </div>

            <!-- Access card -->
            <div class="col-lg-5 d-flex justify-content-center card-col">
                <div class="welcome-card">
                    <div class="text-center mb-3">
                        <span class="brand-badge">RaidLink Technologies</span>
                        <h2>Welcome Back!</h2>
                        <p class="subtitle">Choose your access to continue</p>
                    </div>
                    <div class="d-grid gap-3">
                        <a href="{{ url_for('rider_login') }}"
                           class="btn btn-primary btn-login">
                            🧍 Rider Login
                        </a>
                        <a href="{{ url_for('driver_login') }}"
                           class="btn btn-outline-primary btn-login">
                            🚗 Driver Login
                        </a>
                        <a href="{{ url_for('admin_login') }}"
                           class="btn btn-secondary btn-login">
                            🔒 Admin
                        </a>
                    </div>
                </div>
            </div>

        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
