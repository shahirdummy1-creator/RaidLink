<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - RaidLink Taxi</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 100%); min-height: 100vh; }

        .hero-section {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        .car-img {
            position: absolute;
            left: 5%;
            width: 180px;
            object-fit: contain;
            filter: drop-shadow(0 8px 24px rgba(13,110,253,.18));
        }

        .role-card {
            width: 100%;
            max-width: 340px;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(13,110,253,.13);
            position: relative;
            z-index: 2;
        }

        @media (max-width: 991px) {
            .car-img { display: none; }
            .role-card { max-width: 90%; }
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="#">RaidLink Technologies</a>
    </div>
</nav>

<section class="hero-section">
    <!-- Car image — positioned on left -->
    <img src="{{ url_for('static', filename='images/car.png') }}"
         alt="RaidLink Taxi" class="car-img">

    <!-- Card — absolute center -->
    <div class="card shadow-lg p-4 role-card">
        <h3 class="text-center mb-4 fw-bold" style="color:#0d6efd;">Welcome to RaidLink</h3>
        <div class="d-grid gap-3 welcome-buttons">
            <a href="{{ url_for('rider_login') }}" class="btn btn-primary btn-lg fw-bold">Rider Login</a>
            <a href="{{ url_for('driver_login') }}" class="btn btn-outline-primary btn-lg fw-bold">Driver Login</a>
            <a href="{{ url_for('admin_login') }}" class="btn btn-secondary btn-lg fw-bold">Admin</a>
        </div>
    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
