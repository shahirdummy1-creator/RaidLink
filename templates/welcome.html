<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Welcome - RaidLink Taxi</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    <style>
        body { background: linear-gradient(135deg, #e8f0fe 0%, #f0f4ff 100%); min-height: 100vh; }

        .hero-section {
            min-height: calc(100vh - 56px);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px 16px;
        }

        .welcome-wrapper {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100%;
            max-width: 360px;
        }

        .car-img {
            width: 110px;
            object-fit: contain;
            filter: drop-shadow(0 6px 16px rgba(13,110,253,.2));
            margin-bottom: -20px;
            position: relative;
            z-index: 2;
        }

        .welcome-card {
            background: #fff;
            border-radius: 20px;
            box-shadow: 0 8px 32px rgba(13,110,253,.13);
            padding: 36px 24px 28px;
            width: 100%;
            z-index: 1;
        }

        .welcome-card h3 {
            font-size: 1.2rem;
            font-weight: 800;
            color: #0d6efd;
            margin-bottom: 24px;
        }

        .btn-login {
            padding: 12px;
            font-size: .95rem;
            font-weight: 700;
            border-radius: 12px;
        }
    </style>
</head>
<body>
<nav class="navbar navbar-dark bg-primary">
    <div class="container justify-content-center">
        <a class="navbar-brand fw-bold text-center" href="#">RaidLink Technologies</a>
    </div>
</nav>

<section class="hero-section">
    <div class="welcome-wrapper">

        <!-- Car image on top -->
        <img src="{{ url_for('static', filename='images/car.png') }}"
             alt="RaidLink Taxi" class="car-img">

        <!-- Card below -->
        <div class="welcome-card">
            <h3 class="text-center">Welcome to RaidLink</h3>
            <div class="d-grid gap-3">
                <a href="{{ url_for('rider_login') }}" class="btn btn-primary btn-login fw-bold">Rider Login</a>
                <a href="{{ url_for('driver_login') }}" class="btn btn-outline-primary btn-login fw-bold">Driver Login</a>
                <a href="{{ url_for('admin_login') }}" class="btn btn-secondary btn-login fw-bold">Admin</a>
            </div>
        </div>

    </div>
</section>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
